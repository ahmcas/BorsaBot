# ============================================================
# .github/workflows/tests.yml — BorsaBot CI/CD Test Workflow
# ============================================================

name: BorsaBot Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Her gün 06:00 UTC'de tam test suite
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout kodu al
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} kur
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: NLTK VADER verisini indir
        run: |
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Birim testlerini çalıştır
        run: |
          pytest tests/ -m "unit or (not integration and not e2e and not performance)" \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            -v

      - name: Coverage raporunu artifact olarak yükle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

      - name: Codecov'a yükle
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: unit-tests

    steps:
      - name: Checkout kodu al
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: NLTK VADER verisini indir
        run: |
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Entegrasyon & E2E testlerini çalıştır
        run: |
          pytest tests/ -m "integration or e2e" --runslow -v
        continue-on-error: true

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: unit-tests

    steps:
      - name: Checkout kodu al
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: NLTK VADER verisini indir
        run: |
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Performans testlerini çalıştır
        run: |
          pytest tests/ -m "performance" -v
        continue-on-error: true
