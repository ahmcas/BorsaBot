[pytest]
# ============================================================
# pytest.ini — Pytest Konfigürasyonu
# ============================================================

# Test keşif ayarları
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Çıktı formatı
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Test marker tanımları
markers =
    unit: Birim testleri (hızlı, ~5 dk)
    integration: Entegrasyon testleri (orta, ~10 dk)
    e2e: Uçtan uca testler (yavaş, ~15 dk)
    performance: Performans testleri (opsiyonel, ~5 dk)
    slow: Yavaş testler (--runslow ile çalıştırılır)
    network: Ağ bağlantısı gerektiren testler
